name: CI

on:
  push:
    paths:
      - "package.json"
      - "tsconfig.json"
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "package.json"
      - "tsconfig.json"
      - "src/**"
      - "tests/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Dependency audit
        run: npm audit --omit=dev || true
